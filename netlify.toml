[build]
  command = "npm run build"
  publish = "dist/public"
  functions = "netlify/functions"

# Proxy /api/trpc requests to the tRPC Netlify Function (must come before SPA fallback)
[[redirects]]
  from = "/api/trpc"
  to = "/.netlify/functions/trpc"
  status = 200
  force = true

[[redirects]]
  from = "/api/trpc/*"
  to = "/.netlify/functions/trpc/:splat"
  status = 200
  force = true

# SPA fallback - serve index.html for client-side routes (e.g. /apply, /about)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
